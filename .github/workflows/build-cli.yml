name: Build CLI and Server

on:
  push:
    branches:
      - '**'
  workflow_call:
    inputs:
      version:
        type: string
        required: false
        default: ''
      is_release:
        type: boolean
        required: false
        default: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: linux-arm
            goos: linux
            goarch: arm
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: windows-amd64
            goos: windows
            goarch: amd64
            ext: .exe
          - target: windows-arm64
            goos: windows
            goarch: arm64
            ext: .exe
          - target: freebsd-amd64
            goos: freebsd
            goarch: amd64
          - target: openbsd-amd64
            goos: openbsd
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            # Use latest tag if available, otherwise use short SHA
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
            if [ -z "$VERSION" ]; then
              VERSION="dev-$(git rev-parse --short HEAD)"
            else
              VERSION="${VERSION#v}"
            fi
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Install dependencies
        run: go mod tidy && go mod download

      - name: Build server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p build/${{ matrix.target }}
          go build \
            -ldflags="-w -s -X main.Version=${{ steps.version.outputs.version }}" \
            -o "build/${{ matrix.target }}/quietroom_server-${{ matrix.target }}-v${{ steps.version.outputs.version }}${{ matrix.ext }}" \
            quietroom_server.go

      - name: Build CLI client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-w -s -X main.Version=${{ steps.version.outputs.version }}" \
            -o "build/${{ matrix.target }}/quietroom_client-${{ matrix.target }}-v${{ steps.version.outputs.version }}${{ matrix.ext }}" \
            quietroom_client.go

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quietroom-cli-${{ matrix.target }}
          path: build/${{ matrix.target }}/
          retention-days: 7